<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Swimmers Note Demo</title>
    <style>body{font-family:system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;margin:0;padding:16px} .app{max-width:900px;margin:0 auto} textarea{width:100%;}</style>
  </head>
  <body>
    <div class="app">
      <h2>AI Swimmers Note (デモ)</h2>
      <section>
        <h3>練習を作成</h3>
        <input id="title" placeholder="練習タイトル" style="width:100%" />
        <textarea id="content" rows="6" placeholder="練習内容（セット / インターバル / 距離 / 目的 等）"></textarea>
        <button id="create">作成</button>
        <div id="created" style="margin-top:8px"></div>
      </section>

      <section style="margin-top:20px">
        <h3>練習に対してAIコメントを生成</h3>
        <input id="practiceId" placeholder="Practice ID" />
        <button id="comment">AIにコメントさせる</button>
        <div id="result" style="white-space:pre-wrap;margin-top:12px"></div>
      </section>
    </div>

    <script>
      const sidKey = 'ai_swimmers_session';
      function sessionId(){ let s = localStorage.getItem(sidKey); if(!s){ s = 's_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); localStorage.setItem(sidKey, s);} return s; }

      document.getElementById('create').addEventListener('click', async ()=>{
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        if(!content) return alert('内容を入力してください');
        const res = await fetch('/api/practice', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title, content, sessionId: sessionId() }) });
        const d = await res.json();
        if(d.id) document.getElementById('created').textContent = '作成完了: ID=' + d.id;
        else document.getElementById('created').textContent = JSON.stringify(d);
      });

      document.getElementById('comment').addEventListener('click', async ()=>{
        const id = Number(document.getElementById('practiceId').value || document.getElementById('created').textContent.split('ID=')[1]);
        if(!id) return alert('practice id を指定してください');
        document.getElementById('result').textContent = '生成中...';
        const res = await fetch('/api/comment', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ practiceId: id, sessionId: sessionId() }) });
        const d = await res.json();
        if(d.choices && d.choices[0] && d.choices[0].message){ document.getElementById('result').textContent = d.choices.map(c=>c.message.content).join('\n\n---\n\n'); }
        else if(d.error) document.getElementById('result').textContent = JSON.stringify(d.error);
        else document.getElementById('result').textContent = JSON.stringify(d);
      });
    </script>
  </body>
</html>
